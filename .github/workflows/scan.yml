name: Security Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Unit + integration tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
      - run: pytest -q

  scan-demo-api:
    name: Scan the demo API (regression guard for the checks themselves)
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"

      - name: Start the demo vulnerable API
        run: |
          nohup uvicorn demo_apps.vulnerable.app:app --port 8000 > server.log 2>&1 &
          for i in $(seq 1 10); do
            curl -sf http://localhost:8000/openapi.json > /dev/null && exit 0
            sleep 1
          done
          echo "Server never came up:" && cat server.log && exit 1

      - name: Log in as both demo users
        id: auth
        run: |
          TOKEN_A=$(curl -s -X POST http://localhost:8000/login -H 'Content-Type: application/json' -d '{"username":"alice","password":"alice-pw"}' | python -c "import sys,json;print(json.load(sys.stdin)['access_token'])")
          TOKEN_B=$(curl -s -X POST http://localhost:8000/login -H 'Content-Type: application/json' -d '{"username":"bob","password":"bob-pw"}' | python -c "import sys,json;print(json.load(sys.stdin)['access_token'])")
          echo "::add-mask::$TOKEN_A"
          echo "::add-mask::$TOKEN_B"
          echo "token_a=$TOKEN_A" >> "$GITHUB_OUTPUT"
          echo "token_b=$TOKEN_B" >> "$GITHUB_OUTPUT"

      # This scan is EXPECTED to find vulnerabilities and exit 1 -- the demo
      # API is deliberately broken. That IS the job passing: it proves the
      # checks still catch their target bugs. An exit code of 0 here would
      # mean a check silently regressed, and that's what should fail CI.
      - name: Scan the vulnerable demo (gate must BLOCK)
        run: |
          set +e
          apisec --spec http://localhost:8000/openapi.json --target http://localhost:8000 \
            --auth-header "Bearer ${{ steps.auth.outputs.token_a }}" \
            --auth-header-b "Bearer ${{ steps.auth.outputs.token_b }}" \
            --public-paths "/announcements/*" --json-out vulnerable-report.json
          code=$?
          set -e
          if [ "$code" -ne 1 ]; then
            echo "::error::Expected exit code 1 (findings on the known-vulnerable demo), got $code -- a check may have regressed."
            exit 1
          fi
          python -c "
          import json
          findings = json.load(open('vulnerable-report.json'))
          ids = {f['check_id'] for f in findings}
          missing = {'API1:2023', 'API2:2023', 'API3:2023'} - ids
          if missing:
              raise SystemExit(f'Missing expected finding categories: {missing}')
          print(f'OK: {len(findings)} findings across {sorted(ids)}, as expected')
          "

      # Same gate, run against ONLY an endpoint with no planted vulnerability
      # and no auth requirement (/public/items/{id}) -- proves the gate isn't
      # just always red, it correctly passes when there's nothing to find.
      - name: Scan a known-clean endpoint only (gate must PASS)
        run: |
          curl -s http://localhost:8000/openapi.json -o full-spec.json
          python -c "
          import json
          spec = json.load(open('full-spec.json'))
          spec['paths'] = {p: v for p, v in spec['paths'].items() if p == '/public/items/{item_id}'}
          json.dump(spec, open('clean-spec.json', 'w'))
          "
          apisec --spec clean-spec.json --target http://localhost:8000 \
            --auth-header "Bearer ${{ steps.auth.outputs.token_a }}" \
            --auth-header-b "Bearer ${{ steps.auth.outputs.token_b }}"
          echo "OK: gate correctly passed (0 findings) on a known-clean endpoint"

      - name: Upload scan report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: scan-reports
          path: vulnerable-report.json
